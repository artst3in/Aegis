android.useAndroidX=true
org.gradle.jvmargs=-Xmx4g -XX:+UseParallelGC -XX:MaxMetaspaceSize=1g
kotlin.code.style=official
# R8 COMPAT mode (full mode off). R8 full mode's aggressive register
# allocation / inlining produced a Dalvik VerifyError in the very large
# ChatScreen composable ("copy-cat1 vN<-vM type=Reference: Composer" —
# the ART verifier rejecting an optimised register copy). Compat mode is
# the documented escape hatch and the standard fix for Compose
# VerifyErrors; the size cost is negligible. Applies to the release
# (minified) build — the debug build no longer minifies at all.
android.enableR8.fullMode=false
